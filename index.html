<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PilgrimGuide - Your premium spiritual assistant. Explore timings, tickets, accommodation, food guides, nearby attractions, and budget estimators for India's historic temples.">
    <meta name="keywords" content="pilgrim guide, temple guide, Tirupati, Madurai, Varanasi, spiritual assistant, temple timings, budget calculator">
    <title>PilgrimGuide - Smart Temple Assistant</title>
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- Custom Vanilla CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== MAIN APPLICATION SECTION ===== -->
    <div id="website-view" class="website-view flex-col min-h-screen w-full">
        
        <!-- HEADER NAVBAR -->
        <header class="main-header">
            <div class="nav-container container">
                <div class="logo-wrapper" onclick="renderContent('home')">
                    <span class="logo-icon">🛕</span>
                    <span class="logo-text">PilgrimGuide</span>
                </div>

                <!-- Desktop navigation -->
                <ul id="main-navbar" class="main-navbar-links">
                    <!-- Nav items rendered dynamically -->
                </ul>

                <div class="header-user-actions">
                    <button id="mobile-menu-btn" class="mobile-toggle-btn" aria-label="Toggle Navigation Menu">
                        ☰
                    </button>
                </div>
            </div>

            <!-- Mobile subbar containing temple select -->
            <div class="mobile-subbar">
                <div class="mobile-subbar-container container" style="justify-content: flex-end;">
                    <div class="temple-select-wrapper">
                        <label for="temple-select" class="sr-only">Choose Temple</label>
                        <select id="temple-select" onchange="changeTemple(this.value)">
                            <option value="Tirupati">Tirupati</option>
                            <option value="Madurai">Madurai</option>
                            <option value="Varanasi">Varanasi</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Mobile menu dropdown -->
            <div id="mobile-menu" class="mobile-menu-dropdown hidden">
                <!-- Nav items rendered dynamically -->
            </div>
        </header>

        <!-- MAIN CONTAINER -->
        <main id="app-container" class="main-app-content container">
            <div class="landing-welcome">
                <h1 class="welcome-title">Welcome to Your Spiritual Guide</h1>
                <p class="welcome-text">Loading sacred temple database...</p>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>&copy; 2026 PilgrimGuide. Crafted for elegant spiritual guidance with JavaScript Modules I-VIII.</p>
        </footer>
    </div>

    <!-- Core Javascript -->
    <script src="script.js"></script>
</body>

</html>
